services:
  ghost-gate:
    build:
      context: .
      dockerfile: ghost-gate/Dockerfile
      args:
        GHOST_VERSION: ${GHOST_VERSION:-6-alpine}
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVICE_URL_GHOST_GATE_3989: ${SERVICE_URL_GHOST_GATE_3989}
      SERVICE_URL_GHOST_GATE: ${SERVICE_URL_GHOST_GATE}
      PROXY_GHOST_UPSTREAM: http://ghost:2368
      PROXY_ANALYTICS_UPSTREAM: http://traffic-analytics:3000
      PROXY_ACTIVITYPUB_UPSTREAM: http://activitypub:8080
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_ROOT_PASSWORD: ${SERVICE_PASSWORD_MYSQLROOT}
      MYSQL_USER: ${SERVICE_USER_MYSQL}
      MYSQL_PASSWORD: ${SERVICE_PASSWORD_MYSQL}
      MYSQL_MULTIPLE_DATABASES: ${MYSQL_MULTIPLE_DATABASES:-activitypub}
      MAIL_OPTIONS_AUTH_PASS: ${MAIL_OPTIONS_AUTH_PASS:-mailgun_smtp_user_password}
      MAIL_OPTIONS_AUTH_USER: ${MAIL_OPTIONS_AUTH_USER:-local@localhost}
      MAIL_OPTIONS_PORT: ${MAIL_OPTIONS_PORT:-465}
      MAIL_OPTIONS_SECURE: ${MAIL_OPTIONS_SECURE:-true}
      MAIL_OPTIONS_SERVICE: ${MAIL_OPTIONS_SERVICE:-Mailgun}
      MAIL_OPTIONS_HOST: ${MAIL_OPTIONS_HOST:-smtp.mailgun.org}
      # ghost-gate serves the setup page until all four TINYBIRD_* vars are set; after
      # that it switches to reverse-proxy mode on next start.
      TINYBIRD_API_URL: ${TINYBIRD_API_URL:-}
      TINYBIRD_WORKSPACE_ID: ${TINYBIRD_WORKSPACE_ID:-}
      TINYBIRD_ADMIN_TOKEN: ${TINYBIRD_ADMIN_TOKEN:-}
      TINYBIRD_TRACKER_TOKEN: ${TINYBIRD_TRACKER_TOKEN:-}
    expose:
      - "3989"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q -S -T 3 --spider http://127.0.0.1:3989/__ghost_gate/health 2>&1 | grep -q 'HTTP/1.1 200'"
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 30s

  ghost:
    image: ghost:${GHOST_VERSION:-6-alpine}
    environment:
      url: ${SERVICE_URL_GHOST_GATE}
      NODE_ENV: production
      admin__url: ${SERVICE_URL_GHOST_GATE}
      database__client: mysql
      database__connection__host: mysql
      database__connection__user: ${SERVICE_USER_MYSQL}
      database__connection__password: ${SERVICE_PASSWORD_MYSQL}
      database__connection__database: ${MYSQL_DATABASE-ghost}
      mail__transport: SMTP
      mail__from: ${MAIL_FROM}
      mail__options__auth__pass: ${MAIL_OPTIONS_AUTH_PASS}
      mail__options__auth__user: ${MAIL_OPTIONS_AUTH_USER}
      mail__options__secure: ${MAIL_OPTIONS_SECURE:-true}
      mail__options__port: ${MAIL_OPTIONS_PORT:-465}
      mail__options__service: ${MAIL_OPTIONS_SERVICE:-Mailgun}
      mail__options__host: ${MAIL_OPTIONS_HOST}
      # Same-origin tracker (no CORS).  ghost-gate strips /.ghost/analytics and forwards
      # to traffic-analytics:3000/api/v1/page_hit.
      tinybird__tracker__endpoint: ${SERVICE_URL_GHOST_GATE}/.ghost/analytics/api/v1/page_hit
      labs__publicAPI: "true"
      tinybird__adminToken: ${TINYBIRD_ADMIN_TOKEN}
      tinybird__workspaceId: ${TINYBIRD_WORKSPACE_ID}
      tinybird__tracker__datasource: analytics_events
      # Admin/stats read from Tinybird API directly (not via traffic-analytics).
      tinybird__stats__endpoint: ${TINYBIRD_API_URL:-https://api.tinybird.co}
    volumes:
      - 'ghost-content-data:/var/lib/ghost/content'
    depends_on:
      mysql:
        condition: service_healthy
      ghost-gate:
        condition: service_healthy
      activitypub:
        condition: service_started
        required: false
    # Ghost redirects `/` to its public URL, so `wget --spider` follows the redirect
    # out of the container.  Instead, treat "server answered with any HTTP status line"
    # as alive (busybox wget prints `HTTP/1.1 …` on stderr with -S even for redirects).
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q -S -T 3 --spider http://127.0.0.1:2368/ 2>&1 | grep -q 'HTTP/'"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 120s

  mysql:
    image: mysql:8.0.44@sha256:f37951fc3753a6a22d6c7bf6978c5e5fefcf6f31814d98c582524f98eae52b21
    restart: always
    environment:
      MYSQL_USER: ${SERVICE_USER_MYSQL}
      MYSQL_PASSWORD: ${SERVICE_PASSWORD_MYSQL}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${SERVICE_PASSWORD_MYSQLROOT}
    volumes:
      - 'ghost-mysql-data:/var/lib/mysql'
    healthcheck:
      test: mysqladmin ping -p$$MYSQL_ROOT_PASSWORD -h 127.0.0.1
      interval: 1s
      start_period: 30s
      start_interval: 5s
      timeout: 20s
      retries: 10

  traffic-analytics:
    image: ghost/traffic-analytics:1.0.196@sha256:f93abf4134db41d94d90bb0ef6e4fcc67dfd91162f6ad15423c51e3c49f9c3a7
    restart: always
    depends_on:
      ghost-gate:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - traffic_analytics_data:/data
    environment:
      NODE_ENV: production
      # Behind Traefik/Coolify; client IP from X-Forwarded-For (see TryGhost/TrafficAnalytics).
      TRUST_PROXY: "true"
      PROXY_TARGET: ${TINYBIRD_API_URL:-https://api.tinybird.co}/v0/events
      SALT_STORE_TYPE: ${SALT_STORE_TYPE:-file}
      SALT_STORE_FILE_PATH: /data/salts.json
      TINYBIRD_TRACKER_TOKEN: ${TINYBIRD_TRACKER_TOKEN:-}
      LOG_LEVEL: debug
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q -S -T 3 --spider http://127.0.0.1:3000/ 2>&1 | grep -q 'HTTP/'"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  activitypub:
    image: ghcr.io/tryghost/activitypub:1.2.2@sha256:128f0d08d872930b4ab37c9fc1fe8042fefd44622316b05f3885bd068be7cc43
    restart: always
    expose:
      - "8080"
    volumes:
      - 'ghost-content-data:/opt/activitypub/content'
    environment:
      NODE_ENV: production
      MYSQL_HOST: mysql
      MYSQL_USER: ${SERVICE_USER_MYSQL}
      MYSQL_PASSWORD: ${SERVICE_PASSWORD_MYSQL}
      MYSQL_DATABASE: activitypub
      LOCAL_STORAGE_PATH: /opt/activitypub/content/images/activitypub
      LOCAL_STORAGE_HOSTING_URL: ${SERVICE_URL_GHOST_GATE}/content/images/activitypub
    depends_on:
      mysql:
        condition: service_healthy
      activitypub-migrate:
        condition: service_completed_successfully
    # activitypub (alpine + BusyBox wget) has no documented health URL; accept any HTTP
    # response on :8080 as "process listening".
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -q -S -T 3 --spider http://127.0.0.1:8080/ 2>&1 | grep -q 'HTTP/'"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  activitypub-migrate:
    image: ghcr.io/tryghost/activitypub-migrations:1.2.2@sha256:2af8a0726ac4362cdcab59c308ed612140478d43011ec8d3475bb2634b96d108
    environment:
      MYSQL_DB: mysql://${SERVICE_USER_MYSQL}:${SERVICE_PASSWORD_MYSQL}@tcp(mysql:3306)/activitypub
    depends_on:
      mysql:
        condition: service_healthy
      ghost-gate:
        condition: service_healthy
    restart: no
    # One-shot job with no HTTP server; report healthy unconditionally.  Downstream
    # services gate on service_completed_successfully, not service_healthy.
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 3s
      retries: 1
      start_period: 5s

volumes:
  ghost-content-data:
  ghost-mysql-data:
  traffic_analytics_data:
