name: Sync Upstream Main

on:
  schedule:
    - cron: '32 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/TryGhost/ghost-docker.git
          git fetch upstream

      - name: Check for new upstream commits
        id: check
        run: |
          upstream_sha=$(git rev-parse upstream/main)
          last_sha=""
          if [ -f .last_upstream_sha ]; then
            last_sha=$(<.last_upstream_sha)
          fi
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          if [ "${upstream_sha}" = "${last_sha}" ]; then
            echo "No new upstream commits. Skipping sync."
            echo "new_commits=false" >> "$GITHUB_OUTPUT"
          else
            echo "New upstream commits found: ${upstream_sha}"
            echo "new_commits=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update main branch
        if: steps.check.outputs.new_commits == 'true'
        run: |
          git checkout main
          git merge upstream/main -m "chore: merge upstream main"
          git push origin main

      - name: Merge main into securitysaysyes
        id: merge_ssy
        if: steps.check.outputs.new_commits == 'true'
        run: |
          git fetch origin securitysaysyes
          git checkout securitysaysyes
          if git merge main --no-edit -m "chore: merge upstream main into securitysaysyes"; then
            echo "merge_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "merge_status=failure" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Merge main into feat/ses-mail
        id: merge_ses
        if: steps.check.outputs.new_commits == 'true'
        run: |
          git fetch origin feat/ses-mail
          git checkout feat/ses-mail
          if git merge main --no-edit -m "chore: merge upstream main into feat/ses-mail"; then
            echo "merge_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "merge_status=failure" >> "$GITHUB_OUTPUT"
            git merge --abort
          fi

      - name: Validate compose config (securitysaysyes)
        id: tests
        if: steps.check.outputs.new_commits == 'true' && steps.merge_ssy.outputs.merge_status == 'success'
        run: |
          git checkout securitysaysyes
          if printf 'DATABASE_PASSWORD=x\nDATABASE_ROOT_PASSWORD=x\nDOMAIN=x\nSES_ACCESS_KEY_ID=x\nSES_SECRET_ACCESS_KEY=x\n' > /tmp/.env.ci \
            && docker compose --env-file /tmp/.env.ci config --quiet 2>/dev/null; then
            echo "test_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "test_status=failure" >> "$GITHUB_OUTPUT"
          fi

      - name: Push branches or open PRs on failure
        if: steps.check.outputs.new_commits == 'true'
        run: |
          # securitysaysyes
          if [ "${{ steps.merge_ssy.outputs.merge_status }}" = "success" ]; then
            git checkout securitysaysyes
            git push origin securitysaysyes
          else
            gh pr create \
              --title "CONFLICT: securitysaysyes needs manual merge from upstream" \
              --body "Automatic merge onto upstream ${{ steps.check.outputs.upstream_sha }} failed. Resolve manually." \
              --head securitysaysyes \
              --base main \
              --draft \
              || echo "PR already exists"
          fi

          # feat/ses-mail
          if [ "${{ steps.merge_ses.outputs.merge_status }}" = "success" ]; then
            git checkout feat/ses-mail
            git push origin feat/ses-mail
          else
            gh pr create \
              --title "CONFLICT: feat/ses-mail needs manual merge from upstream" \
              --body "Automatic merge onto upstream ${{ steps.check.outputs.upstream_sha }} failed. Resolve manually." \
              --head feat/ses-mail \
              --base main \
              --draft \
              || echo "PR already exists"
          fi

      - name: Save upstream SHA
        if: steps.check.outputs.new_commits == 'true'
        run: |
          git checkout main
          echo "${{ steps.check.outputs.upstream_sha }}" > .last_upstream_sha
          git add .last_upstream_sha
          git diff --staged --quiet || git commit -m "chore: update last synced upstream sha"
          git push origin main
